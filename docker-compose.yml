services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: companycore
      POSTGRES_USER: companycore
      POSTGRES_PASSWORD: companycore
    volumes:
      - companycore_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companycore -d companycore"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://companycore:companycore@postgres:5432/companycore?schema=public
      SEED_API_KEY: dev-companycore-key
    ports:
      - "3000:3000"

volumes:
  companycore_postgres:
